<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexWallet - Security Gate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/auth.css" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="text-center mb-4">
                    <h1 style="color: #48CAE4; font-weight: 700; letter-spacing: 1px;">APEXWALLET</h1>
                    <p class="text-muted">Enterprise Digital Asset Ledger</p>
                </div>

                <div id="loginCard" class="card auth-card p-4">
                    <h3 class="mb-3 text-center">Account Sign In</h3>
                    <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="loginEmail" class="form-control" required placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="loginPassword" class="form-control" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-apex w-100 py-2 mt-2">Authenticate</button>
                    </form>
                    <div class="text-center mt-3">
                        <span class="text-muted">New to ApexWallet?</span>
                        <span class="toggle-link" onclick="toggleAuth(true)">Register Here</span>
                    </div>
                </div>

                <div id="registerCard" class="card auth-card p-4 d-none">
                    <h3 class="mb-3 text-center">Open Secure Account</h3>
                    <div id="registerAlert" class="alert alert-danger d-none" role="alert"></div>
                    <div id="registerSuccess" class="alert alert-success d-none" role="alert"></div>
                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" id="regName" class="form-control" required placeholder="Tank Krupal">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="regEmail" class="form-control" required placeholder="krupal@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Identity Document Number (AES Encrypted)</label>
                            <input type="text" id="regIdentity" class="form-control" required placeholder="ABC123XYZ">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Secure Password</label>
                            <input type="password" id="regPassword" class="form-control" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-apex w-100 py-2 mt-2">Initialize Wallet</button>
                    </form>
                    <div class="text-center mt-3">
                        <span class="text-muted">Already have a wallet?</span>
                        <span class="toggle-link" onclick="toggleAuth(false)">Sign In</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
