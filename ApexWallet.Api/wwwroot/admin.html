<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexWallet - Administrative Governance Console</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold text-warning">🛡️ APEXWALLET ADMIN PORTAL</span>
            <button class="btn btn-outline-light btn-sm" onclick="sessionStorage.removeItem('isAdminAuthenticated'); window.location.href='adminlogin.html'">Exit Console</button>        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div class="card p-4 shadow-sm bg-white border">
                    <h4 class="mb-3 text-dark fw-bold">🔒 Frozen Accounts Management Audit</h4>
                    <p class="text-muted">Below is a list of digital asset wallets currently placed under security locks. Verify identity logs before executing reactivation.</p>

                    <div class="table-responsive mt-3">
                        <table class="table table-striped table-bordered align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>User ID</th>
                                    <th>Full Name</th>
                                    <th>Email Address</th>
                                    <th>Account Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="adminTableBody">
                                <tr>
                                    <td colspan="5" class="text-center text-muted py-4">Loading audit logs...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>

        // 📌 INSERT THIS AT THE ABSOLUTE START OF THE <script> TAG IN admin.html

        // Route Gatekeeper Guard: Force redirect if token authentication flag is absent
        if (sessionStorage.getItem("isAdminAuthenticated") !== "true") {
            alert("⛔ Access Prohibited: Direct entry is blocked. Please log in first.");
            window.location.href = "adminlogin.html";
        }

        // ... (Rest of your existing admin.html code for loading locked accounts stays exactly beneath this)

        const API_BASE_URL = "https://localhost:7284/api/v1";
        const token = sessionStorage.getItem("authToken");
        const secureHeaders = { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" };

        document.addEventListener("DOMContentLoaded", loadLockedAccounts);

        // 1. Fetch all accounts from database matching custom filter queries
        async function loadLockedAccounts() {
            try {
                // For simplified development, we are querying our user list directly from a new lookup endpoint
                const res = await fetch(`${API_BASE_URL}/user/lookup/locked-list`, { headers: secureHeaders });
                const tbody = document.getElementById("adminTableBody");
                tbody.innerHTML = "";

                if (res.ok) {
                    const list = await res.json();
                    if (list.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="5" class="text-center text-success fw-medium py-4">✅ Clean State: No accounts are currently locked.</td></tr>`;
                        return;
                    }

                    list.forEach(u => {
                        const row = `<tr>
                                <td class="fw-bold">${u.userid || u.userId}</td>
                                <td>${u.fullname || u.fullName}</td>
                                <td>${u.email}</td>
                                <td><span class="badge bg-danger">${u.accountStatus || u.accountstatus}</span></td>
                                <td>
                                    <button class="btn btn-sm btn-success fw-bold" onclick="reactivateUser(${u.userid || u.userId})">🔓 Reactivate Account</button>
                                </td>
                            </tr>`;
                        tbody.innerHTML += row;
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4">Unauthorized Admin Privilege Token context map.</td></tr>`;
                }
            } catch (err) { console.error(err); }
        }

        // 2. Post activation message up to the controller to switch states back to Active
        async function reactivateUser(id) {
            if (!confirm("Confirm asset reactivation state initialization?")) return;

            // 📌 Step 1: Find the specific button that was clicked to freeze it
            // This targets the button inside the row without freezing other rows
            const button = event.target;
            button.disabled = true;
            const originalBtnText = button.innerHTML;
            button.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Reactivating...`;

            try {
                const res = await fetch(`${API_BASE_URL}/user/lookup/reactivate/${id}`, {
                    method: "POST",
                    headers: secureHeaders
                });

                if (res.ok) {
                    alert("🔓 Success! Account successfully reactivated and confirmation email dispatched.");
                    loadLockedAccounts(); // Re-render the fresh table data rows
                } else {
                    alert("Failed to clear security state flag.");
                    // Only unfreeze if it fails, since success will re-render the whole table anyway
                    button.disabled = false;
                    button.innerHTML = originalBtnText;
                }
            } catch (err) {
                console.error(err);
                alert("Network error processing activation parameters.");
                button.disabled = false;
                button.innerHTML = originalBtnText;
            }
        }
    </script>
</body>
</html>
